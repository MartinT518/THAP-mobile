<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2196F3" />
  <title>Thap — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #212121;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 360px; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: #e3f2fd;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; color: #2196f3; }
    h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: .75rem; }
    p { font-size: .938rem; color: #616161; line-height: 1.5; margin-bottom: 2rem; }
    button {
      background: #2196f3; color: #fff; border: none; border-radius: 2rem;
      padding: .75rem 2rem; font-size: .938rem; font-weight: 500;
      cursor: pointer; transition: opacity .2s;
    }
    button:hover { opacity: .9; }
    button:active { opacity: .8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Previously viewed products are still available — try going back.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
